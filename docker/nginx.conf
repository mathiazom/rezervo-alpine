server {
    listen 80;
    root /usr/share/nginx/html;

    # Runtime config — never cache
    location = /config.json {
        add_header Cache-Control "no-store";
        try_files /config.json =404;
    }

    # Hashed assets — cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # App routes — serve corresponding HTML
    location = /login    { try_files /login.html    =404; }
    location = /callback { try_files /callback.html =404; }
    location = /chains   { try_files /chains.html   =404; }
    location = /sessions { try_files /sessions.html =404; }

    # /schedule/<chain> → schedule.html; JS reads pathname
    location /schedule/  { try_files /schedule.html =404; }

    # Root redirect
    location = / { return 302 /chains; }

    # Fallback
    location / { try_files $uri $uri.html =404; }
}
