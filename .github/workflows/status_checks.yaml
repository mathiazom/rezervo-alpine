name: CI
on:
    pull_request:
    push:
        branches: [main]

    workflow_dispatch:

jobs:
    typecheck:
        name: Type check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: Type check
              run: pnpm typecheck

    check:
        name: Biome
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: Biome check
              run: pnpm check

    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install
            - name: Build
              run: pnpm build
