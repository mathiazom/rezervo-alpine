<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rezervo – timeplan</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body x-data="chainsPage">
    <nav class="topbar">
      <a href="/" class="logo"><img src="/logo.svg" alt="rezervo" class="nav-logo" /></a>
      <div class="nav-links">
        <a href="/sessions" class="nav-link">Mine timer</a>
        <a href="/chains" class="nav-link">Timeplan</a>
        <button type="button" @click="logout()" class="btn btn-ghost btn-sm">Logg ut</button>
      </div>
    </nav>

    <main class="container">
      <div x-show="loading" class="spinner-wrap">
        <span class="spinner"></span>
      </div>

      <p x-show="error && !loading" x-text="error" x-cloak style="display:none" class="error-msg"></p>

      <ul x-show="!loading" x-cloak style="display:none" class="chain-list">
        <template x-for="chain in chains" :key="chain.profile.identifier">
          <li>
            <!-- biome-ignore lint/a11y/useAnchorContent: aria-label is set dynamically via Alpine :aria-label binding -->
            <a :href="scheduleUrl(chain.profile.identifier)" :aria-label="chain.profile.name" class="chain-card">
              <picture>
                <source media="(prefers-color-scheme: light)" :srcset="config.apiUrl + '/' + chain.profile.images.light.largeLogo" />
                <img
                  :src="config.apiUrl + '/' + chain.profile.images.dark.largeLogo"
                  :alt="chain.profile.name"
                  alt=""
                  class="chain-logo"
                />
              </picture>
            </a>
          </li>
        </template>
      </ul>
    </main>

    <script type="module" src="./ts/components/chainsPage.ts"></script>
  </body>
</html>
