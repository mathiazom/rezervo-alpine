<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rezervo – logg inn</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body x-data="loginPage">
    <div class="page-center">
      <div class="card">
        <h1 class="logo">rezervo</h1>

        <div x-show="loading" class="spinner-wrap">
          <span class="spinner"></span>
        </div>

        <div x-show="!loading" x-cloak style="display:none">
          <p x-show="error" x-text="error" class="error-msg"></p>
          <button
            type="button"
            x-show="!error"
            @click="login()"
            class="btn btn-primary btn-full"
          >
            Logg inn med FusionAuth
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./ts/components/loginPage.ts"></script>
  </body>
</html>
